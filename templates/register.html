{% extends "base.html" %}
{% block title %}Register — CVR Resolve{% endblock %}
{% block body %}
<div class="login-page">
  <div class="login-bg"></div>
  <div class="login-card">
    <div class="login-logo">
      <div class="logo-big">CVR <span>Resolve</span></div>
      <p>Create your student account</p>
    </div>
    <h2>Register</h2>
    <form method="POST">
      <div class="form-group">
        <label>Full Name</label>
        <input type="text" name="name" placeholder="Your full name" required />
      </div>
      <div class="form-group">
        <label>Username</label>
        <input type="text" name="username" placeholder="Choose a username" required />
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" name="email" placeholder="your@student.cvr.ac.in" />
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" placeholder="Choose a password" required />
      </div>
      <button type="submit" class="btn btn-primary login-btn">Create Account →</button>
    </form>
    <div style="text-align:center;margin-top:16px;font-size:13px;color:var(--text3);">
      Already have an account? <a href="{{ url_for('login') }}">Sign in</a>
    </div>
  </div>
</div>
{% endblock %}
